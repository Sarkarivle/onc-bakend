<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONC Admin | Manage Jansewa Kendras</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style> body { font-family: 'Inter', sans-serif; } </style>
</head>
<script>
    if (!localStorage.getItem('admin_token')) window.location.href = '/admin/login';
</script>
<body class="bg-[#F8F9FA]">
    <div class="flex">
        <!-- Sidebar -->
        <div class="w-64 bg-[#1A237E] min-h-screen p-6 text-white hidden md:block">
            <h2 class="text-2xl font-black mb-10">ONC Panel</h2>
            <nav class="space-y-4">
                <a href="/admin/dashboard" class="flex items-center space-x-3 p-3 hover:bg-white/5 rounded-xl transition">
                    <span>🏠 Dashboard</span>
                </a>
                <a href="/admin/planner-logs" class="flex items-center space-x-3 p-3 hover:bg-white/5 rounded-xl transition">
                    <span>🧠 AI Planner Logs</span>
                </a>
                <a href="/admin/jansewa" class="flex items-center space-x-3 bg-white/10 p-3 rounded-xl">
                    <span>🏢 Jansewa Kendras</span>
                </a>
                <a href="/admin/jobs" class="flex items-center space-x-3 p-3 hover:bg-white/5 rounded-xl transition">
                    <span>💼 Manage Jobs</span>
                </a>
                <a href="#" class="flex items-center space-x-3 p-3 hover:bg-white/5 rounded-xl transition">
                    <span>👥 Users</span>
                </a>
                <a href="#" class="flex items-center space-x-3 p-3 hover:bg-white/5 rounded-xl transition">
                    <span>📊 Reports</span>
                </a>
                <a href="/admin/settings" class="flex items-center space-x-3 p-3 hover:bg-white/5 rounded-xl transition">
                    <span>⚙️ Settings</span>
                </a>
                <div class="pt-10">
                    <button onclick="logout()" class="flex items-center space-x-3 p-3 text-red-300 hover:bg-red-500/10 w-full rounded-xl transition">
                        <span>🚪 Logout</span>
                    </button>
                </div>
            </nav>
        </div>

        <!-- Main Content -->
        <div class="flex-1 min-h-screen">
            <header class="bg-white border-b border-gray-100 p-6 flex justify-between items-center">
                <h1 class="text-xl font-bold text-gray-800">Jansewa Kendras</h1>
                <button onclick="toggleModal(true)" class="bg-[#1A237E] text-white px-6 py-2 rounded-xl font-bold hover:bg-indigo-900 transition">
                    + Add New Kendra
                </button>
            </header>

            <main class="p-8">
                <div class="bg-white rounded-3xl shadow-sm border border-gray-50 overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-gray-50 text-gray-400 text-xs uppercase">
                            <tr>
                                <th class="p-4">Kendra Name</th>
                                <th class="p-4">Location</th>
                                <th class="p-4">Price</th>
                                <th class="p-4">Status</th>
                                <th class="p-4">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="kendraList" class="divide-y divide-gray-50">
                            <!-- Data will be loaded here -->
                        </tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>

    <!-- Add Modal -->
    <div id="modal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-8 w-full max-w-md">
            <h2 class="text-2xl font-bold mb-6 text-[#1A237E]">Add New Kendra</h2>
            <form id="addForm" class="space-y-4">
                <input type="text" id="name" placeholder="Kendra Name" required class="w-full px-4 py-3 rounded-xl border border-gray-100 bg-gray-50 outline-none">
                <input type="text" id="location" placeholder="Location" required class="w-full px-4 py-3 rounded-xl border border-gray-100 bg-gray-50 outline-none">
                <input type="number" id="price" placeholder="Starting Price (₹)" required class="w-full px-4 py-3 rounded-xl border border-gray-100 bg-gray-50 outline-none">
                <select id="iconType" class="w-full px-4 py-3 rounded-xl border border-gray-100 bg-gray-50 outline-none">
                    <option value="store">Store Front</option>
                    <option value="computer">Computer Center</option>
                    <option value="devices">Digital Devices</option>
                </select>
                <div class="flex space-x-3 pt-4">
                    <button type="button" onclick="toggleModal(false)" class="flex-1 py-3 rounded-xl font-bold text-gray-500 bg-gray-100">Cancel</button>
                    <button type="submit" class="flex-1 py-3 rounded-xl font-bold text-white bg-[#1A237E]">Save Kendra</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        async function fetchKendras() {
            const res = await fetch('/api/v1/jansewa');
            const result = await res.json();
            const list = document.getElementById('kendraList');
            list.innerHTML = result.data.map(k => `
                <tr>
                    <td class="p-4 font-semibold">${k.name}</td>
                    <td class="p-4 text-gray-500">${k.location}</td>
                    <td class="p-4 font-bold text-green-600">₹${k.startingPrice}</td>
                    <td class="p-4"><span class="bg-blue-50 text-blue-600 px-3 py-1 rounded-full text-xs font-bold">${k.isVerified ? 'Verified' : 'Pending'}</span></td>
                    <td class="p-4"><button class="text-red-500 font-bold text-sm">Delete</button></td>
                </tr>
            `).join('');
        }

        document.getElementById('addForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const token = localStorage.getItem('admin_token');
            const data = {
                name: document.getElementById('name').value,
                location: document.getElementById('location').value,
                startingPrice: document.getElementById('price').value,
                iconType: document.getElementById('iconType').value,
                isVerified: true
            };

            const res = await fetch('/api/v1/jansewa', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token
                },
                body: JSON.stringify(data)
            });

            if (res.ok) {
                toggleModal(false);
                fetchKendras();
                document.getElementById('addForm').reset();
            } else {
                alert('Failed to add Kendra. Make sure you are logged in as admin.');
            }
        });

        function toggleModal(show) {
            document.getElementById('modal').classList.toggle('hidden', !show);
        }

        function logout() {
            localStorage.removeItem('admin_token');
            window.location.href = '/admin/login';
        }

        fetchKendras();
    </script>
</body>
</html>

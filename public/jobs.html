<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONC Admin | Manage Jobs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style> body { font-family: 'Inter', sans-serif; } </style>
</head>
<body class="bg-[#F8F9FA]">
    <div class="flex">
        <!-- Sidebar (Simplified for brevity) -->
        <div class="w-64 bg-[#1A237E] min-h-screen p-6 text-white hidden md:block">
            <h2 class="text-2xl font-black mb-10">ONC Panel</h2>
            <nav class="space-y-4">
                <a href="/admin/dashboard" class="flex items-center space-x-3 p-3 hover:bg-white/5 rounded-xl transition"><span>🏠 Dashboard</span></a>
                <a href="/admin/jobs" class="flex items-center space-x-3 bg-white/10 p-3 rounded-xl"><span>💼 Manage Jobs</span></a>
                <a href="/admin/settings" class="flex items-center space-x-3 p-3 hover:bg-white/5 rounded-xl transition"><span>⚙️ Settings</span></a>
            </nav>
        </div>

        <div class="flex-1 min-h-screen">
            <header class="bg-white border-b border-gray-100 p-6 flex justify-between items-center">
                <h1 class="text-xl font-bold text-gray-800">Job Management</h1>
            </header>

            <main class="p-8">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                    <!-- URL Import -->
                    <div class="bg-white p-8 rounded-3xl shadow-sm border border-gray-50">
                        <h2 class="text-lg font-bold mb-4">Link Se Import</h2>
                        <input id="import-url" type="text" placeholder="Paste URL here..." class="w-full bg-gray-50 border border-gray-100 rounded-xl px-4 py-3 text-sm mb-4">
                        <button onclick="importProcess({url: document.getElementById('import-url').value})" class="w-full bg-[#1A237E] text-white py-3 rounded-xl font-bold">Sync URL with AI</button>
                    </div>

                    <!-- Manual Text Import -->
                    <div class="bg-white p-8 rounded-3xl shadow-sm border border-gray-50">
                        <h2 class="text-lg font-bold mb-4">Text Se Import (100% Work)</h2>
                        <textarea id="import-text" rows="2" placeholder="Copy-paste job page text here..." class="w-full bg-gray-50 border border-gray-100 rounded-xl px-4 py-3 text-sm mb-4"></textarea>
                        <button onclick="importProcess({rawText: document.getElementById('import-text').value})" class="w-full bg-green-600 text-white py-3 rounded-xl font-bold text-sm">Process Text with AI</button>
                    </div>
                </div>

                <!-- Job List -->
                <div class="bg-white rounded-3xl shadow-sm border border-gray-50 overflow-hidden">
                    <div class="p-6 border-b flex justify-between">
                        <h2 class="font-bold">Active Jobs</h2>
                        <button onclick="loadJobs()" class="text-blue-600 text-sm">Refresh</button>
                    </div>
                    <table class="w-full text-left">
                        <tbody id="job-table-body"></tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>

    <script>
        const admin_token = localStorage.getItem('admin_token');

        async function importProcess(body) {
            if (!body.url && !body.rawText) return alert('Input missing');
            const btn = event.target;
            btn.innerText = '🤖 AI Processing...';
            btn.disabled = true;

            try {
                const res = await fetch('/api/v1/jobs/admin/import', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${admin_token}` },
                    body: JSON.stringify(body)
                });
                const data = await res.json();
                if (data.status === 'success') {
                    alert('Job Saved Successfully!');
                    loadJobs();
                } else alert(data.message);
            } finally {
                btn.innerText = body.url ? 'Sync URL' : 'Process Text';
                btn.disabled = false;
            }
        }

        async function loadJobs() {
            const res = await fetch('/api/v1/jobs');
            const data = await res.json();
            document.getElementById('job-table-body').innerHTML = data.data.map(j => `
                <tr class="border-b">
                    <td class="p-4 font-bold text-sm">${j.title}</td>
                    <td class="p-4 text-xs text-gray-400">${j.category}</td>
                    <td class="p-4 text-right">
                        <button onclick="deleteJob('${j._id}')" class="text-red-500 text-xs">Delete</button>
                    </td>
                </tr>
            `).join('');
        }

        async function deleteJob(id) {
            if (confirm('Delete?')) {
                await fetch('/api/v1/jobs/'+id, { method: 'DELETE', headers: { 'Authorization': `Bearer ${admin_token}` } });
                loadJobs();
            }
        }

        loadJobs();
    </script>
</body>
</html>

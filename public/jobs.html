<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONC Admin - Job Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loader { border-top-color: #3498db; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <nav class="bg-blue-600 text-white p-4 shadow-lg flex justify-between">
        <h1 class="text-xl font-bold">ONC Admin Dashboard</h1>
        <button onclick="logout()" class="bg-red-500 px-4 py-1 rounded">Logout</button>
    </nav>

    <div class="container mx-auto p-6">
        <!-- 1. DISCOVERY & IMPORT SECTION -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div class="bg-white p-6 rounded-lg shadow">
                <h2 class="text-lg font-bold mb-4">Discover New Jobs</h2>
                <p class="text-sm text-gray-500 mb-4">Scan SarkariResult for latest links</p>
                <button onclick="discoverJobs()" class="bg-green-600 text-white px-6 py-2 rounded hover:bg-green-700">Scan Now</button>
                <div id="discovery-results" class="mt-4 max-h-60 overflow-y-auto space-y-2"></div>
            </div>

            <div class="bg-white p-6 rounded-lg shadow">
                <h2 class="text-lg font-bold mb-4">Quick AI Import</h2>
                <input id="import-url" type="text" placeholder="Paste Job URL here..." class="w-full p-2 border rounded mb-2">
                <select id="import-cat" class="w-full p-2 border rounded mb-4">
                    <option value="Latest Jobs">Latest Jobs</option>
                    <option value="Results">Results</option>
                    <option value="Admit Card">Admit Card</option>
                </select>
                <button onclick="importJob()" id="import-btn" class="bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700">Sync with AI</button>
            </div>
        </div>

        <!-- 2. JOB LIST & EDITOR -->
        <div class="bg-white p-6 rounded-lg shadow">
            <h2 class="text-lg font-bold mb-4 border-b pb-2">Active Job List</h2>
            <div id="job-list" class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="bg-gray-50">
                            <th class="p-3">Title</th>
                            <th class="p-3">Organization</th>
                            <th class="p-3">Category</th>
                            <th class="p-3">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="job-table-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- EDIT MODAL -->
    <div id="edit-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-4xl p-6 rounded-lg shadow-xl max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold">Edit Job Data (Elastic JSON)</h2>
                <button onclick="closeModal()" class="text-gray-500 text-2xl">&times;</button>
            </div>
            <div class="space-y-4">
                <input id="edit-id" type="hidden">
                <div>
                    <label class="block text-sm font-bold">Job Title</label>
                    <input id="edit-title" class="w-full p-2 border rounded">
                </div>
                <div>
                    <label class="block text-sm font-bold">Elastic Specifications (JSON)</label>
                    <textarea id="edit-specs" rows="15" class="w-full p-2 border rounded font-mono text-sm bg-gray-50"></textarea>
                </div>
                <button onclick="saveJob()" class="bg-green-600 text-white px-6 py-2 rounded">Save Changes</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api/v1/jobs';
        const token = localStorage.getItem('token');

        if (!token) window.location.href = '/admin/login';

        async function discoverJobs() {
            const res = await fetch(`${API_BASE}/admin/discover`, { headers: { 'Authorization': `Bearer ${token}` } });
            const data = await res.json();
            const div = document.getElementById('discovery-results');
            div.innerHTML = data.links.map(l => `
                <div class="flex justify-between items-center p-2 border-b text-sm">
                    <span class="truncate w-64">${l.title}</span>
                    <button onclick="importManual('${l.url}')" class="text-blue-600 font-bold">Import</button>
                </div>
            `).join('');
        }

        async function importManual(url) {
            document.getElementById('import-url').value = url;
            importJob();
        }

        async function importJob() {
            const url = document.getElementById('import-url').value;
            const category = document.getElementById('import-cat').value;
            const btn = document.getElementById('import-btn');
            if (!url) return alert('URL missing');

            btn.innerText = 'Syncing...';
            btn.disabled = true;

            try {
                const res = await fetch(`${API_BASE}/admin/import`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ url, category })
                });
                const data = await res.json();
                if (data.status === 'success') {
                    alert('Job imported successfully!');
                    loadJobs();
                } else alert(data.message);
            } finally {
                btn.innerText = 'Sync with AI';
                btn.disabled = false;
            }
        }

        async function loadJobs() {
            const res = await fetch(API_BASE);
            const data = await res.json();
            const body = document.getElementById('job-table-body');
            body.innerHTML = data.data.map(j => `
                <tr class="border-b hover:bg-gray-50">
                    <td class="p-3">${j.title}</td>
                    <td class="p-3">${j.organization}</td>
                    <td class="p-3">${j.category}</td>
                    <td class="p-3 space-x-2">
                        <button onclick="editJob('${j._id}')" class="text-blue-600">Edit</button>
                        <button onclick="deleteJob('${j._id}')" class="text-red-600">Delete</button>
                    </td>
                </tr>
            `).join('');
        }

        async function editJob(id) {
            const res = await fetch(API_BASE);
            const data = await res.json();
            const job = data.data.find(x => x._id === id);

            document.getElementById('edit-id').value = job._id;
            document.getElementById('edit-title').value = job.title;
            document.getElementById('edit-specs').value = JSON.stringify(job.specifications, null, 2);
            document.getElementById('edit-modal').classList.remove('hidden');
        }

        async function saveJob() {
            const id = document.getElementById('edit-id').value;
            const title = document.getElementById('edit-title').value;
            let specs;
            try {
                specs = JSON.parse(document.getElementById('edit-specs').value);
            } catch(e) { return alert('Invalid JSON Format'); }

            const res = await fetch(`${API_BASE}/${id}`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ title, specifications: specs })
            });

            if (res.ok) {
                alert('Saved!');
                closeModal();
                loadJobs();
            }
        }

        async function deleteJob(id) {
            if (!confirm('Sure?')) return;
            await fetch(`${API_BASE}/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
            loadJobs();
        }

        function closeModal() { document.getElementById('edit-modal').classList.add('hidden'); }
        function logout() { localStorage.clear(); window.location.href = '/admin/login'; }

        loadJobs();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONC Admin | Manage Jobs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .modal-scroll::-webkit-scrollbar { width: 6px; }
        .modal-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#F8F9FA]">
    <div class="flex">
        <!-- Sidebar -->
        <div class="w-64 bg-[#1A237E] min-h-screen p-6 text-white hidden md:block fixed">
            <h2 class="text-2xl font-black mb-10">ONC Panel</h2>
            <nav class="space-y-4">
                <a href="/admin/dashboard" class="flex items-center space-x-3 p-3 hover:bg-white/5 rounded-xl transition">
                    <span>🏠 Dashboard</span>
                </a>
                <a href="/admin/planner-logs" class="flex items-center space-x-3 p-3 hover:bg-white/5 rounded-xl transition">
                    <span>🧠 AI Planner Logs</span>
                </a>
                <a href="/admin/jansewa" class="flex items-center space-x-3 p-3 hover:bg-white/5 rounded-xl transition">
                    <span>🏢 Jansewa Kendras</span>
                </a>
                <a href="/admin/jobs" class="flex items-center space-x-3 bg-white/10 p-3 rounded-xl">
                    <span>💼 Manage Jobs</span>
                </a>
                <a href="#" class="flex items-center space-x-3 p-3 hover:bg-white/5 rounded-xl transition">
                    <span>👥 Users</span>
                </a>
                <a href="#" class="flex items-center space-x-3 p-3 hover:bg-white/5 rounded-xl transition">
                    <span>📊 Reports</span>
                </a>
                <a href="/admin/settings" class="flex items-center space-x-3 p-3 hover:bg-white/5 rounded-xl transition">
                    <span>⚙️ Settings</span>
                </a>
                <div class="pt-10">
                    <button onclick="logout()" class="flex items-center space-x-3 p-3 text-red-300 hover:bg-red-500/10 w-full rounded-xl transition">
                        <span>🚪 Logout</span>
                    </button>
                </div>
            </nav>
        </div>

        <div class="flex-1 md:ml-64 min-h-screen">
            <header class="bg-white border-b border-gray-100 p-6 flex justify-between items-center sticky top-0 z-10">
                <h1 class="text-xl font-bold text-gray-800">Job Management</h1>
                <div class="flex gap-4">
                    <button onclick="loadJobs()" class="text-sm font-bold text-blue-600">Refresh List</button>
                    <button onclick="logout()" class="text-sm font-bold text-red-500">Logout</button>
                </div>
            </header>

            <main class="p-8">
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
                    <div class="bg-white p-8 rounded-3xl shadow-sm border border-gray-100">
                        <h2 class="font-bold mb-4">Sync via URL</h2>
                        <input id="import-url" type="text" placeholder="Paste link..." class="w-full bg-gray-50 border-0 rounded-xl px-4 py-3 mb-4 focus:ring-2 focus:ring-blue-500">
                        <button onclick="importProcess({url: document.getElementById('import-url').value})" class="w-full bg-[#1A237E] text-white py-3 rounded-xl font-bold">Sync AI</button>
                    </div>
                    <div class="bg-white p-8 rounded-3xl shadow-sm border border-gray-100">
                        <h2 class="font-bold mb-4">Process Raw Text</h2>
                        <textarea id="import-text" rows="1" placeholder="Paste raw text..." class="w-full bg-gray-50 border-0 rounded-xl px-4 py-3 mb-4 focus:ring-2 focus:ring-green-500"></textarea>
                        <button onclick="importProcess({rawText: document.getElementById('import-text').value})" class="w-full bg-green-600 text-white py-3 rounded-xl font-bold">Extract with AI</button>
                    </div>
                </div>

                <div class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-gray-50 text-xs uppercase text-gray-400 font-bold">
                            <tr>
                                <th class="p-4">Title & Organization</th>
                                <th class="p-4">Category</th>
                                <th class="p-4 text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="job-table-body" class="divide-y divide-gray-50"></tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>

    <!-- EDIT MODAL -->
    <div id="edit-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="bg-white w-full max-w-4xl p-8 rounded-3xl shadow-2xl max-h-[90vh] flex flex-col">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-gray-800">Edit Job Record</h2>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-800 text-3xl">&times;</button>
            </div>

            <div class="modal-scroll overflow-y-auto flex-1 space-y-6 pr-2">
                <input id="edit-id" type="hidden">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Job Title</label>
                        <input id="edit-title" class="w-full bg-gray-50 border border-gray-100 rounded-xl px-4 py-3 text-sm outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Category</label>
                        <select id="edit-category" class="w-full bg-gray-50 border border-gray-100 rounded-xl px-4 py-3 text-sm outline-none">
                            <option value="Latest Jobs">Latest Jobs</option>
                            <option value="Jobs">Jobs</option>
                            <option value="Results">Results</option>
                            <option value="Admit Card">Admit Card</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Elastic Data (Full JSON)</label>
                    <textarea id="edit-json" rows="15" class="w-full bg-gray-900 text-green-400 p-6 rounded-2xl font-mono text-xs focus:outline-none focus:ring-4 focus:ring-blue-500/20 leading-relaxed"></textarea>
                </div>
            </div>

            <div class="flex gap-4 mt-8">
                <button onclick="saveChanges()" class="flex-1 bg-blue-600 text-white py-4 rounded-2xl font-bold hover:bg-blue-700 transition">Save Everything</button>
                <button onclick="closeModal()" class="px-8 py-4 border border-gray-100 rounded-2xl font-bold text-gray-500 hover:bg-gray-50">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const admin_token = localStorage.getItem('admin_token');
        let allJobs = [];

        async function importProcess(body) {
            if (!body.url && !body.rawText) return alert('Input missing');
            const btn = event.target;
            btn.innerText = 'AI Working...';
            btn.disabled = true;

            try {
                const res = await fetch('/api/v1/jobs/admin/import', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${admin_token}` },
                    body: JSON.stringify(body)
                });
                const data = await res.json();
                if (data.status === 'success') { alert('Done!'); loadJobs(); } else alert(data.message);
            } finally { btn.innerText = body.url ? 'Sync AI' : 'Extract AI'; btn.disabled = false; }
        }

        async function loadJobs() {
            const res = await fetch('/api/v1/jobs');
            const data = await res.json();
            allJobs = data.data;
            document.getElementById('job-table-body').innerHTML = allJobs.map(j => `
                <tr class="hover:bg-gray-50 transition">
                    <td class="p-4">
                        <p class="font-bold text-gray-800 text-sm">${j.title}</p>
                        <p class="text-[10px] text-gray-400">${j.organization}</p>
                    </td>
                    <td class="p-4"><span class="bg-blue-50 text-blue-600 text-[10px] font-black px-2 py-1 rounded-md uppercase">${j.category}</span></td>
                    <td class="p-4 text-right">
                        <button onclick="openEdit('${j._id}')" class="text-blue-600 font-bold text-xs mr-4">Edit</button>
                        <button onclick="deleteJob('${j._id}')" class="text-red-500 font-bold text-xs">Delete</button>
                    </td>
                </tr>
            `).join('');
        }

        function openEdit(id) {
            window.location.href = `/admin/edit-job?id=${id}`;
        }

        async function saveChanges() {
            const id = document.getElementById('edit-id').value;
            const title = document.getElementById('edit-title').value;
            const category = document.getElementById('edit-category').value;
            let updatedData;
            try { updatedData = JSON.parse(document.getElementById('edit-json').value); } catch(e) { return alert('Invalid JSON!'); }

            const res = await fetch(`/api/v1/jobs/${id}`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${admin_token}` },
                body: JSON.stringify({ title, category, ...updatedData })
            });

            if (res.ok) { alert('Saved!'); closeModal(); loadJobs(); }
            else alert('Save failed');
        }

        function deleteJob(id) { if (confirm('Delete?')) fetch('/api/v1/jobs/'+id, { method: 'DELETE', headers: { 'Authorization': `Bearer ${admin_token}` } }).then(loadJobs); }
        function closeModal() { document.getElementById('edit-modal').classList.add('hidden'); }
        function logout() { localStorage.clear(); window.location.href = '/admin/login'; }
        loadJobs();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Job | ONC Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.ckeditor.com/4.22.1/full/ckeditor.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f0f2f5; }
        .tox-tinymce { border-radius: 8px !important; border: 1px solid #ddd !important; }
        /* Hide TinyMCE and CKEditor Warnings */
        .tox-notifications-container, .tox-statusbar__branding, .tox-upgrade, .tox-throbber,
        .cke_notification_warning, .cke_notification_info { display: none !important; }
    </style>
</head>
<body class="p-0 m-0">
    <!-- Header -->
    <header class="bg-white border-b px-6 py-3 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-4">
            <a href="/admin/jobs" class="text-gray-400 hover:text-gray-600 transition">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>
            </a>
            <h1 class="text-lg font-bold text-gray-800">Edit Job</h1>
        </div>
        <div class="flex gap-3">
            <button onclick="saveJob('draft')" class="px-4 py-2 text-sm font-semibold border rounded-md hover:bg-gray-50 bg-white">Save Draft</button>
            <button onclick="saveJob('publish')" class="px-6 py-2 text-sm font-bold bg-[#1A237E] text-white rounded-md hover:bg-blue-900 shadow-sm">Publish</button>
        </div>
    </header>

    <div class="max-w-[1400px] mx-auto flex flex-col lg:flex-row gap-6 p-6">
        <!-- Main Content -->
        <div class="flex-1 space-y-6">
            <div class="bg-white p-6 rounded-lg shadow-sm border">
                <label for="job-title" class="hidden">Job Title</label>
                <input id="job-title" type="text" placeholder="Add title" class="w-full text-2xl font-bold border-b border-gray-100 pb-2 focus:border-blue-500 outline-none mb-2">

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                    <div>
                        <label for="job-org" class="block text-[10px] font-black text-gray-400 uppercase mb-1">Organization</label>
                        <input id="job-org" type="text" class="w-full border border-gray-200 rounded px-3 py-2 focus:border-blue-500 outline-none text-sm bg-gray-50">
                    </div>
                    <div>
                        <label for="job-link" class="block text-[10px] font-black text-gray-400 uppercase mb-1">Apply Link</label>
                        <input id="job-link" type="text" class="w-full border border-gray-200 rounded px-3 py-2 focus:border-blue-500 outline-none text-sm bg-gray-50">
                    </div>
                </div>

                <div class="mb-4 flex justify-between items-center">
                    <button class="flex items-center gap-2 px-3 py-1.5 border rounded text-xs font-semibold hover:bg-gray-50">
                        <span>🖼️</span> Add Media
                    </button>
                    <div class="flex bg-gray-100 p-1 rounded-lg">
                        <button onclick="toggleEditorMode('visual')" id="btn-visual" class="px-4 py-1.5 text-xs font-bold rounded-md bg-white shadow-sm transition">Visual</button>
                        <button onclick="toggleEditorMode('code')" id="btn-code" class="px-4 py-1.5 text-xs font-bold rounded-md text-gray-500 hover:text-gray-700 transition">Code</button>
                        <button onclick="toggleEditorMode('preview')" id="btn-preview" class="px-4 py-1.5 text-xs font-bold rounded-md text-gray-500 hover:text-gray-700 transition">Preview</button>
                    </div>
                </div>

                <!-- Editor Container -->
                <div id="visual-editor-container">
                    <textarea id="job-content"></textarea>
                </div>
                <div id="code-editor-container" class="hidden">
                    <textarea id="job-content-raw" class="w-full h-[600px] bg-gray-900 text-green-400 p-6 rounded-lg font-mono text-sm border-0 focus:ring-0 leading-relaxed overflow-y-auto"></textarea>
                </div>
                <div id="preview-editor-container" class="hidden border rounded-lg bg-white overflow-hidden">
                    <iframe id="preview-frame" class="w-full h-[600px] border-0"></iframe>
                </div>
            </div>

            <!-- Structured Data (Expert Mode) -->
            <div class="bg-white p-6 rounded-lg shadow-sm border">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-sm font-bold text-gray-600 uppercase tracking-wider">Expert Data Helper (Dynamic)</h2>
                    <div class="flex gap-2">
                        <button onclick="syncFormToJson()" class="text-[10px] bg-blue-50 text-blue-600 px-3 py-1.5 rounded font-bold border border-blue-100 hover:bg-blue-100 transition">Update JSON from Form</button>
                        <button onclick="syncJsonToForm()" class="text-[10px] bg-green-50 text-green-600 px-3 py-1.5 rounded font-bold border border-green-100 hover:bg-green-100 transition">Refresh Form from JSON</button>
                    </div>
                </div>

                <!-- Dynamic Form Container -->
                <div id="dynamic-form-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-x-6 gap-y-4 mb-8">
                    <!-- Fields will be auto-generated here -->
                </div>

                <details>
                    <summary class="text-[10px] font-bold text-gray-400 cursor-pointer uppercase tracking-wider hover:text-gray-600 transition">Raw JSON (Expert Mode)</summary>
                    <div class="mt-4">
                         <textarea id="job-json" rows="15" class="w-full bg-gray-900 text-green-400 p-4 rounded-lg font-mono text-xs leading-relaxed"></textarea>
                    </div>
                </details>
            </div>
        </div>

        <!-- Sidebar -->
        <div class="w-full lg:w-80 space-y-6">
            <!-- Publish Box -->
            <div class="bg-white rounded-lg shadow-sm border overflow-hidden">
                <div class="px-4 py-3 border-b bg-gray-50 flex justify-between items-center">
                    <span class="font-bold text-sm">Publish</span>
                    <button class="text-gray-400">▼</button>
                </div>
                <div class="p-4 space-y-3 text-sm">
                    <div class="flex justify-between">
                        <button onclick="saveJob('draft')" class="px-3 py-1 border rounded hover:bg-gray-50">Save Draft</button>
                        <button class="px-3 py-1 border rounded hover:bg-gray-50">Preview</button>
                    </div>
                    <div class="space-y-2 py-2 border-t border-b">
                        <div class="flex items-center gap-2 text-gray-600">
                            <span>📌</span> Status: <b id="status-display">Published</b> <a href="#" class="text-blue-600 underline ml-1">Edit</a>
                        </div>
                        <div class="flex items-center gap-2 text-gray-600">
                            <span>👁️</span> Visibility: <b>Public</b> <a href="#" class="text-blue-600 underline ml-1">Edit</a>
                        </div>
                        <div class="flex items-center gap-2 text-gray-600">
                            <span>📅</span> Published: <b id="date-display">Immediately</b> <a href="#" class="text-blue-600 underline ml-1">Edit</a>
                        </div>
                    </div>
                    <div class="flex justify-between items-center pt-2">
                        <button onclick="deleteJob()" class="text-red-600 underline font-medium">Move to Trash</button>
                        <button onclick="saveJob('publish')" class="bg-blue-600 text-white px-4 py-2 rounded font-bold shadow-sm">Update</button>
                    </div>
                </div>
            </div>

            <!-- Categories Box -->
            <div class="bg-white rounded-lg shadow-sm border overflow-hidden">
                <div class="px-4 py-3 border-b bg-gray-50 flex justify-between items-center">
                    <span class="font-bold text-sm">Categories</span>
                    <button class="text-gray-400">▼</button>
                </div>
                <div class="p-4">
                    <div class="flex gap-4 border-b mb-4 text-xs font-bold">
                        <button class="border-b-2 border-blue-600 pb-2">All Categories</button>
                        <button class="text-gray-400 pb-2">Most Used</button>
                    </div>
                    <div id="category-list" class="space-y-2 max-h-40 overflow-y-auto mb-4 text-sm">
                        <label class="flex items-center gap-2"><input type="radio" name="category" value="Latest Jobs" class="rounded"> Latest Jobs</label>
                        <label class="flex items-center gap-2"><input type="radio" name="category" value="Admit Card" class="rounded"> Admit Card</label>
                        <label class="flex items-center gap-2"><input type="radio" name="category" value="Results" class="rounded"> Results</label>
                        <label class="flex items-center gap-2"><input type="radio" name="category" value="Jobs" class="rounded"> Jobs</label>
                    </div>
                    <button onclick="addNewCategory()" class="text-blue-600 text-xs font-bold underline">+ Add New Category</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const jobId = urlParams.get('id');
        const isNewJob = jobId === 'new';
        const admin_token = localStorage.getItem('admin_token');

        if (!jobId) {
            alert('No Job ID found');
            window.location.href = '/admin/jobs';
        }

        // --- Editor Initialization ---
        let editorInstance = null;
        window.editorReady = false;
        window.queuedContent = null;

        function initCKEditor() {
            console.log("Attempting to initialize CKEditor...");
            if (typeof CKEDITOR === 'undefined') {
                console.log("CKEDITOR undefined, retrying in 100ms...");
                setTimeout(initCKEditor, 100);
                return;
            }

            try {
                // Hide the security warning
                CKEDITOR.config.versionCheck = false;

                editorInstance = CKEDITOR.replace('job-content', {
                    height: 600,
                    fullPage: false, // Changed to false: we are dealing with HTML fragments
                    allowedContent: true,
                    extraAllowedContent: '*(*){*}; table tr td th[*]', // Allow all classes, styles, and table attributes
                    removeFormatAttributes: '',
                    entities: false, // Don't encode entities
                    basicEntities: false,
                    startupFocus: true,
                    // Modern & Clean Toolbar
                    toolbar: [
                        { name: 'document', items: [ 'Source', '-', 'Maximize', 'ShowBlocks' ] },
                        { name: 'clipboard', items: [ 'Undo', 'Redo' ] },
                        { name: 'basicstyles', items: [ 'Bold', 'Italic', 'Underline', 'Strike', '-', 'RemoveFormat' ] },
                        { name: 'paragraph', items: [ 'NumberedList', 'BulletedList', '-', 'JustifyLeft', 'JustifyCenter', 'JustifyRight', 'JustifyBlock' ] },
                        { name: 'links', items: [ 'Link', 'Unlink' ] },
                        { name: 'insert', items: [ 'Image', 'Table', 'HorizontalRule' ] },
                        '/',
                        { name: 'styles', items: [ 'Format', 'Font', 'FontSize' ] },
                        { name: 'colors', items: [ 'TextColor', 'BGColor' ] }
                    ],
                    contentsCss: [
                        'https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap',
                        'data:text/css;base64,' + btoa(`
                            body { font-family: 'Inter', sans-serif; font-size: 14px; padding: 20px; line-height: 1.6; color: #333; background: #fff; }
                            .sv-box { border: 2px solid #1A237E; border-radius: 12px; padding: 25px; margin-bottom: 25px; background: #fff; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
                            .sv-h1 { font-size: 24px; font-weight: 800; color: #1A237E; text-align: center; margin-bottom: 20px; border-bottom: 3px solid #1A237E; padding-bottom: 10px; }
                            .sv-h2 { font-size: 18px; font-weight: 700; color: #d32f2f; margin-top: 25px; margin-bottom: 15px; border-left: 5px solid #d32f2f; padding-left: 10px; }
                            .sv-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; background: #fff; }
                            .sv-table th, .sv-table td { border: 1px solid #e0e0e0; padding: 12px; text-align: left; }
                            .sv-table th { background: #f8f9fa; color: #1A237E; font-weight: 700; width: 35%; }
                            .sv-table td { color: #444; }
                            a { color: #1A237E; text-decoration: underline; font-weight: 600; }
                        `)
                    ]
                });

                editorInstance.on('instanceReady', () => {
                    console.log("CKEditor Instance is fully ready.");
                    window.editorReady = true;
                    if (window.queuedContent !== null) {
                        console.log("Applying queued content to editor.");
                        // Force HTML mode by ensuring content is treated as such
                        editorInstance.setData(window.queuedContent);
                        window.queuedContent = null;
                    }
                });

                editorInstance.on('error', (evt) => {
                    console.error("CKEditor Error:", evt);
                });

            } catch (err) {
                console.error("Failed to initialize CKEditor:", err);
            }
        }

        // Run init on DOM load
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initCKEditor);
        } else {
            initCKEditor();
        }

        let currentMode = 'visual';

        function toggleEditorMode(mode) {
            if (mode === currentMode) return;
            console.log(`Switching mode: ${currentMode} -> ${mode}`);

            const btns = { visual: 'btn-visual', code: 'btn-code', preview: 'btn-preview' };
            const containers = { visual: 'visual-editor-container', code: 'code-editor-container', preview: 'preview-editor-container' };

            const rawTextarea = document.getElementById('job-content-raw');
            const previewFrame = document.getElementById('preview-frame');

            let content = "";
            if (currentMode === 'visual') {
                content = (editorInstance && window.editorReady) ? editorInstance.getData() : (window.queuedContent || "");
            } else {
                content = rawTextarea.value;
            }

            if (mode === 'visual') {
                if (editorInstance && window.editorReady) {
                    editorInstance.setData(content);
                } else {
                    window.queuedContent = content;
                }
            } else if (mode === 'code') {
                rawTextarea.value = content;
            } else if (mode === 'preview') {
                const doc = previewFrame.contentDocument || previewFrame.contentWindow.document;
                doc.open();
                doc.write(`
                    <!DOCTYPE html>
                    <html>
                        <head>
                            <meta charset="UTF-8">
                            <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
                            <style>
                                body { font-family: 'Inter', sans-serif; padding: 30px; line-height: 1.6; background: #fff; color: #333; }
                                .sv-box { border: 2px solid #1A237E; border-radius: 12px; padding: 25px; margin-bottom: 25px; background: #fff; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
                                .sv-h1 { font-size: 24px; font-weight: 800; color: #1A237E; text-align: center; margin-bottom: 20px; border-bottom: 3px solid #1A237E; padding-bottom: 10px; }
                                .sv-h2 { font-size: 18px; font-weight: 700; color: #d32f2f; margin-top: 25px; margin-bottom: 15px; border-left: 5px solid #d32f2f; padding-left: 10px; }
                                .sv-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
                                .sv-table th, .sv-table td { border: 1px solid #e0e0e0; padding: 12px; text-align: left; }
                                .sv-table th { background: #f8f9fa; color: #1A237E; font-weight: 700; }
                                a { color: #1A237E; text-decoration: underline; }
                            </style>
                        </head>
                        <body>${content}</body>
                    </html>
                `);
                doc.close();
                rawTextarea.value = content;
            }

            Object.keys(containers).forEach(k => {
                document.getElementById(containers[k]).classList.toggle('hidden', k !== mode);
                const btn = document.getElementById(btns[k]);
                if (k === mode) {
                    btn.classList.add('bg-white', 'shadow-sm');
                    btn.classList.remove('text-gray-500');
                } else {
                    btn.classList.remove('bg-white', 'shadow-sm');
                    btn.classList.add('text-gray-500');
                }
            });

            currentMode = mode;
        }

        async function loadJob() {
            if (isNewJob) {
                console.log("New Job Mode active.");
                document.querySelectorAll('h1').forEach(h => h.innerText = "Create New Job");
                document.getElementById('date-display').innerText = "Not yet published";
                document.getElementById('status-display').innerText = "Draft";
                document.getElementById('job-json').value = "{}";
                return;
            }
            try {
                console.log("Fetching job data...");
                const res = await fetch(`/api/v1/jobs/${jobId}`, {
                    headers: { 'Authorization': `Bearer ${admin_token}` }
                });

                const responseData = await res.json();
                if (!res.ok) throw new Error(responseData.message || 'Failed to fetch job');

                const data = responseData.data;
                document.getElementById('job-title').value = data.title || "";
                document.getElementById('job-org').value = data.organization || "";
                document.getElementById('job-link').value = data.applyLink || "";

                const { _id, title, organization, applyLink, category, createdAt, isActive, fullHtmlContent, ...rest } = data;
                document.getElementById('job-json').value = JSON.stringify(rest, null, 4);

                if (data.createdAt) {
                    document.getElementById('date-display').innerText = new Date(data.createdAt).toLocaleString();
                }

                const radios = document.querySelectorAll('#category-list input');
                radios.forEach(rb => {
                    if (rb.value === data.category) rb.checked = true;
                });

                const content = data.fullHtmlContent || "";
                document.getElementById('job-content-raw').value = content;

                if (editorInstance && window.editorReady) {
                    console.log("Setting editor data directly.");
                    editorInstance.setData(content);
                } else {
                    console.log("Editor not ready, queuing content for load.");
                    window.queuedContent = content;
                }

                // Sync the easy form
                syncJsonToForm();

            } catch (e) {
                console.error('Load Error:', e);
                alert('Error: ' + e.message);
            }
        }

        async function saveJob(status) {
            console.log(`Saving job as ${status}...`);
            const title = document.getElementById('job-title').value;
            const organization = document.getElementById('job-org').value;
            const applyLink = document.getElementById('job-link').value;

            let content = "";
            if (currentMode === 'visual') {
                content = (editorInstance && window.editorReady) ? editorInstance.getData() : (window.queuedContent || "");
            } else {
                content = document.getElementById('job-content-raw').value;
            }

            let category = "Latest Jobs";
            const checked = document.querySelector('#category-list input:checked');
            if (checked) category = checked.value;

            let additionalData = {};
            try {
                additionalData = JSON.parse(document.getElementById('job-json').value);
            } catch(e) {
                console.warn("Invalid structured data JSON, skipping merge.");
            }

            const body = {
                ...additionalData,
                title,
                organization,
                applyLink,
                category,
                fullHtmlContent: content,
                isActive: status === 'publish'
            };

            const url = isNewJob ? '/api/v1/jobs' : `/api/v1/jobs/${jobId}`;
            const method = isNewJob ? 'POST' : 'PATCH';

            const res = await fetch(url, {
                method: method,
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${admin_token}`
                },
                body: JSON.stringify(body)
            });

            if (res.ok) {
                const responseData = await res.json();
                alert(isNewJob ? 'Job created successfully!' : 'Job saved successfully!');

                if (isNewJob && responseData.data && responseData.data._id) {
                    window.location.href = `/admin/edit-job?id=${responseData.data._id}`;
                } else {
                    if (status === 'publish') {
                        document.getElementById('status-display').innerText = 'Published';
                    }
                }
            } else {
                const errData = await res.json();
                alert('Failed to save job: ' + (errData.message || 'Unknown error'));
            }
        }

        async function deleteJob() {
            if (confirm('Are you sure you want to move this job to trash?')) {
                const res = await fetch(`/api/v1/jobs/${jobId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${admin_token}` }
                });
                if (res.ok) {
                    window.location.href = '/admin/jobs';
                }
            }
        }

        function addNewCategory() {
            const name = prompt("Enter new category name:");
            if (name) {
                const list = document.getElementById('category-list');
                const label = document.createElement('label');
                label.className = "flex items-center gap-2";
                label.innerHTML = `<input type="radio" name="category" value="${name}" class="rounded" checked> ${name}`;
                list.appendChild(label);
            }
        }

        // --- Dynamic JSON <-> Form Synchronization ---
        function syncJsonToForm() {
            try {
                const jsonText = document.getElementById('job-json').value;
                const data = JSON.parse(jsonText);
                const container = document.getElementById('dynamic-form-container');
                container.innerHTML = ''; // Clear existing

                const excludeKeys = ['_id', 'searchVector', '__v', 'fullHtmlContent', 'title', 'organization', 'applyLink', 'category', 'isActive', 'createdAt', 'updatedAt', 'importantDates', 'applicationFee', 'eligibility', 'aiCoreSummary'];

                function buildForm(obj, parentPath = '') {
                    for (const key in obj) {
                        if (excludeKeys.includes(key) && parentPath === '') continue;

                        const value = obj[key];
                        const currentPath = parentPath ? `${parentPath}.${key}` : key;

                        if (typeof value === 'object' && value !== null && !Array.isArray(value)) {
                            // Recursively build for nested objects
                            buildForm(value, currentPath);
                        } else {
                            // Create input for primitive values or arrays
                            const fieldDiv = document.createElement('div');
                            fieldDiv.className = "flex flex-col gap-1";

                            const label = document.createElement('label');
                            label.className = "text-[10px] font-bold text-gray-400 uppercase truncate";
                            label.title = currentPath;
                            label.innerText = currentPath.split('.').join(' ➔ ');

                            let input;
                            if (typeof value === 'string' && value.length > 50) {
                                input = document.createElement('textarea');
                                input.rows = 2;
                            } else {
                                input = document.createElement('input');
                                input.type = "text";
                            }

                            input.className = "dynamic-field w-full border border-gray-200 rounded px-3 py-2 text-xs bg-gray-50 focus:bg-white focus:border-blue-400 outline-none transition";
                            input.dataset.path = currentPath;
                            input.value = (typeof value === 'object') ? JSON.stringify(value) : (value || "");

                            fieldDiv.appendChild(label);
                            fieldDiv.appendChild(input);
                            container.appendChild(fieldDiv);
                        }
                    }
                }

                buildForm(data);
                console.log("Dynamic form generated (filtered).");
            } catch (e) {
                console.warn("Could not sync JSON to Form: Invalid JSON", e);
            }
        }

        function syncFormToJson() {
            try {
                let data = JSON.parse(document.getElementById('job-json').value);
                const fields = document.querySelectorAll('.dynamic-field');

                fields.forEach(field => {
                    const path = field.dataset.path.split('.');
                    const value = field.value;

                    let current = data;
                    for (let i = 0; i < path.length - 1; i++) {
                        const part = path[i];
                        if (!current[part]) current[part] = {};
                        current = current[part];
                    }

                    const lastPart = path[path.length - 1];

                    // Try to parse as JSON if it looks like an array or object
                    if ((value.startsWith('[') && value.endsWith(']')) || (value.startsWith('{') && value.endsWith('}'))) {
                        try {
                            current[lastPart] = JSON.parse(value);
                        } catch(e) {
                            current[lastPart] = value; // Fallback to string
                        }
                    } else {
                        current[lastPart] = value;
                    }
                });

                document.getElementById('job-json').value = JSON.stringify(data, null, 4);
                alert("JSON updated from form fields!");
            } catch (e) {
                alert("Error updating JSON: Make sure the Raw JSON is valid first.");
            }
        }

        loadJob();
    </script>
</body>
</html>
